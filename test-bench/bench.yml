bench:
  name: test-bench
  python: "3.14"
  process_manager: honcho
  http_port: 8100
  socketio_port: 9100

apps:
  - name: frappe
    repo: https://github.com/frappe/frappe
    branch: version-16

sites:
  - name: site1.localhost
    default: true
    admin_password: "admin"
    apps:
      - frappe

mariadb:
  host: localhost
  port: 3306
  root_password: "admin"
  admin_user: root

redis:
  cache_port: 13100
  queue_port: 11100
  socketio_port: 12100

workers:
  default: 1
  short: 1
  long: 1

admin:
  port: 8102
  timeout: 180
