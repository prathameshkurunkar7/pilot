name: Marketplace App Check

on:
  pull_request:
    paths:
      - "registry/apps_v2.json"

jobs:
  validate-schema:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Get base apps_v2.json
        run: git show ${{ github.event.pull_request.base.sha }}:registry/apps_v2.json > /tmp/apps_before.json

      - name: Validate registry schema
        run: python3 scripts/validate_registry_schema.py /tmp/apps_before.json registry/apps_v2.json

  semgrep-check:
    needs: validate-schema
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install semgrep
        run: uv tool install semgrep

      - name: Get base apps_v2.json
        run: git show ${{ github.event.pull_request.base.sha }}:registry/apps_v2.json > /tmp/apps_before.json

      - name: Check changed marketplace apps
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/check_marketplace_apps.py /tmp/apps_before.json registry/apps_v2.json
